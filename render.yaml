services:
  - type: web
    name: bebidas-server
    runtime: node
    rootDir: buscadordebebidasconIA/server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: AI_API_URL
        value: https://api.groq.com/openai/v1/chat/completions
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
